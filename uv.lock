# Generate uv.lock
uv lock

# If uv doesn't work, create manually:
@"
version = 1
requires-python = ">=3.10"

[[package]]
name = "openenv-email-triage"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "openai" },
    { name = "openenv-core" },
]
"@ | Out-File -FilePath uv.lock -Encoding utf8